<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    width: 320px;
    background: #fff;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.logo {
    text-align: center;
    font-size: 26px;
    margin-bottom: 20px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 15px;
}

button:hover {
    background: #43a047;
}

.links {
    text-align: center;
    margin-top: 10px;
}

.links a {
    font-size: 12px;
    color: #555;
    text-decoration: none;
    display: block;
}
</style>
</head>

<body>

<div class="login-box">
    <div class="logo">DemoForum</div>

    <input id="login" type="text" placeholder="Логин или email">
    <input id="pass" type="password" placeholder="Пароль">

    <button onclick="demoLogin()">Войти</button>

    <div class="links">
        <a href="#">Забыли пароль?</a>
        <a href="#">Регистрация</a>
    </div>
</div>

<script>
function demoLogin() {
    let l = document.getElementById("login").value.trim();
    let p = document.getElementById("pass").value.trim();

    if (l === "" || p === "") {
        alert("Введите логин и пароль");
        return;
    }

    // имитация загрузки
    localStorage.setItem("demo_user", l);

    // переход в кабинет
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
