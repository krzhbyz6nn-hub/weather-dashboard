<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Dashboard v3</title>
  <link rel="stylesheet" href="style.css">

  <!-- графики -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="topbar">
    <h1>📊 Smart Dashboard v3</h1>
    <button onclick="toggleTheme()">🌓 Тема</button>
  </div>

  <div class="container">

    <!-- WEATHER -->
    <div class="card">
      <h2>🌤 Погода (5 источников)</h2>
      <input id="city" placeholder="Город">
      <button onclick="getWeather()">Показать</button>
      <div id="weather"></div>
    </div>

    <!-- CURRENCY -->
    <div class="card">
      <h2>💱 Валюта + график</h2>
      <button onclick="getCurrency()">Обновить</button>
      <canvas id="chart"></canvas>
      <div id="currency"></div>
    </div>

    <!-- NEWS -->
    <div class="card">
      <h2>🗞 Новости мира</h2>
      <button onclick="getNews()">Загрузить</button>
      <div id="news"></div>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
