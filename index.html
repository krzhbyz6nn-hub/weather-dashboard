<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard v3.5</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="topbar">
    <h1>📊 Smart Dashboard v3.5</h1>
    <button onclick="toggleTheme()">🌓 Тема</button>
  </div>

  <div class="container">

    <div class="card">
      <h2>🌤 Погода</h2>
      <button onclick="getWeather()">Обновить</button>
      <div id="weather"></div>
    </div>

    <div class="card">
      <h2>💱 Валюта</h2>
      <button onclick="getCurrency()">Обновить</button>
      <canvas id="chart"></canvas>
      <div id="currency"></div>
    </div>

    <div class="card">
      <h2>🗞 Новости</h2>
      <button onclick="getNews()">Загрузить</button>
      <div id="news"></div>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
